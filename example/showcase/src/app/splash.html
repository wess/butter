<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f1a;
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 1.5rem;
      }
      .logo {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #f5c842;
      }
      .loading {
        font-size: 0.95rem;
        color: #888;
        letter-spacing: 0.04em;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #333;
        border-top-color: #f5c842;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="logo">Butter</div>
    <div class="spinner"></div>
    <div class="loading">Loading Butter Showcase...</div>
  </body>
</html>
