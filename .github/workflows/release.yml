name: Release

on:
  push:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: diff
        run: |
          OLD=$(git show HEAD~1:package.json | jq -r '.version' 2>/dev/null || echo "")
          NEW=$(jq -r '.version' package.json)
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: macos-latest
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - name: Run tests
        run: |
          bun test tests/types.test.ts tests/config.test.ts tests/protocol.test.ts tests/ipc.test.ts tests/menu.test.ts tests/runtime.test.ts tests/shim.test.ts tests/doctor.test.ts
          bun test tests/shmem.test.ts

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          bun publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        run: |
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.check-version.outputs.version }}"
          generate_release_notes: true
          draft: false

  build-binaries:
    runs-on: macos-latest
    needs: [check-version, publish]
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            name: butter-darwin-arm64
            archive: tar.gz
          - target: bun-darwin-x64
            name: butter-darwin-x64
            archive: tar.gz
          - target: bun-linux-x64
            name: butter-linux-x64
            archive: tar.gz
          - target: bun-linux-arm64
            name: butter-linux-arm64
            archive: tar.gz
          - target: bun-windows-x64
            name: butter-windows-x64
            archive: zip
    steps:
      - uses: actions/checkout@v5
        with:
          ref: "v${{ needs.check-version.outputs.version }}"
      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Compile binary
        run: |
          mkdir -p dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            bun build --compile --target=${{ matrix.target }} src/cli/index.ts --outfile dist/butter.exe
          else
            bun build --compile --target=${{ matrix.target }} src/cli/index.ts --outfile dist/butter
          fi

      - name: Package archive
        run: |
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip ../${{ matrix.name }}.zip butter.exe
          else
            tar czf ../${{ matrix.name }}.tar.gz butter
          fi

      - name: Upload to release
        run: |
          if [ "${{ matrix.archive }}" = "zip" ]; then
            gh release upload "v${{ needs.check-version.outputs.version }}" ${{ matrix.name }}.zip --clobber
          else
            gh release upload "v${{ needs.check-version.outputs.version }}" ${{ matrix.name }}.tar.gz --clobber
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [check-version, build-binaries]
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - name: Download release binaries and compute SHAs
        id: shas
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          BASE="https://github.com/wess/butter/releases/download/v${VERSION}"
          for target in darwin-arm64 darwin-x64 linux-x64; do
            FILE="butter-${target}.tar.gz"
            for i in $(seq 1 30); do
              if curl -fsSL -o "/tmp/${FILE}" "${BASE}/${FILE}" 2>/dev/null; then
                echo "${target} available"
                break
              fi
              echo "Waiting for ${target}... ($i/30)"
              sleep 10
            done
            SHA=$(sha256sum "/tmp/${FILE}" | cut -d' ' -f1)
            KEY=$(echo "${target}" | tr '-' '_')
            echo "sha_${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew tap
        uses: actions/checkout@v5
        with:
          repository: wess/homebrew-packages
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cat > tap/Formula/butter.rb << 'RUBY'
          class Butter < Formula
            desc "Lightweight desktop app framework with native webview and TypeScript"
            homepage "https://github.com/wess/butter"
            version "VERSION_PLACEHOLDER"

            if OS.mac?
              if Hardware::CPU.intel?
                url "https://github.com/wess/butter/releases/download/v#{version}/butter-darwin-x64.tar.gz"
                sha256 "SHA_DARWIN_X64_PLACEHOLDER"
              else # ARM
                url "https://github.com/wess/butter/releases/download/v#{version}/butter-darwin-arm64.tar.gz"
                sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
              end
            elsif OS.linux?
              url "https://github.com/wess/butter/releases/download/v#{version}/butter-linux-x64.tar.gz"
              sha256 "SHA_LINUX_X64_PLACEHOLDER"
            end

            def install
              bin.install "butter"
            end

            test do
              assert_match "Usage: butter <command>", shell_output("#{bin}/butter")
            end
          end
          RUBY
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Formula/butter.rb
          sed -i "s/SHA_DARWIN_X64_PLACEHOLDER/${{ steps.shas.outputs.sha_darwin_x64 }}/g" tap/Formula/butter.rb
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/${{ steps.shas.outputs.sha_darwin_arm64 }}/g" tap/Formula/butter.rb
          sed -i "s/SHA_LINUX_X64_PLACEHOLDER/${{ steps.shas.outputs.sha_linux_x64 }}/g" tap/Formula/butter.rb

      - name: Push updated formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/butter.rb
          git commit -m "Update butter to v${{ needs.check-version.outputs.version }}"
          git push
