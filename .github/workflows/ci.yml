name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Run tests
        run: |
          bun test tests/types.test.ts tests/config.test.ts tests/protocol.test.ts tests/ipc.test.ts tests/menu.test.ts tests/runtime.test.ts tests/shim.test.ts tests/doctor.test.ts tests/plugins.test.ts tests/dialog.test.ts tests/native.test.ts tests/cli.test.ts tests/allowlist.test.ts tests/bundle.test.ts tests/sign.test.ts tests/streaming.test.ts tests/window.test.ts tests/ipcround.test.ts tests/ring.test.ts tests/devloop.test.ts tests/shmemwin.test.ts
          bun test tests/shmem.test.ts

      - name: Verify shim compiles
        run: clang -o /tmp/shimtest src/shim/darwin.m -framework Cocoa -framework WebKit -framework UniformTypeIdentifiers -fobjc-arc && rm /tmp/shimtest

      - name: Verify CLI runs
        run: bun src/cli/index.ts doctor
