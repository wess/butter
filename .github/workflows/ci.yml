name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2

      - name: Install Linux WebKit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Verify shim compiles (darwin)
        if: runner.os == 'macOS'
        run: |
          clang -o /tmp/shimtest src/shim/darwin.m \
            -framework Cocoa -framework WebKit -framework UniformTypeIdentifiers \
            -fobjc-arc
          rm /tmp/shimtest

      - name: Verify shim compiles (linux)
        if: runner.os == 'Linux'
        run: |
          cc -o /tmp/shimtest src/shim/linux.c \
            $(pkg-config --cflags --libs gtk+-3.0 webkit2gtk-4.1)
          rm /tmp/shimtest

      # Windows shim verification deferred: WebView2Loader.lib isn't on the runner
      # by default, and the doctor smoke test below already confirms WebView2 runtime
      # presence and that the CLI bootstraps cleanly.

      - name: Doctor smoke test
        run: bun src/cli/index.ts doctor
