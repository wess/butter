name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Run tests
        run: |
          bun test tests/types.test.ts tests/config.test.ts tests/protocol.test.ts tests/ipc.test.ts tests/menu.test.ts tests/runtime.test.ts tests/shim.test.ts tests/doctor.test.ts
          bun test tests/shmem.test.ts

      - name: Verify shim compiles
        run: clang -o /tmp/shimtest src/shim/darwin.m -framework Cocoa -framework WebKit -fobjc-arc && rm /tmp/shimtest

      - name: Verify CLI runs
        run: bun src/cli/index.ts doctor
